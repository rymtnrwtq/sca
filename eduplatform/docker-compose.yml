services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sca-eduplatform
    restart: unless-stopped
    # Port 3000 exposed directly for Cloudflare Workers proxy
    # (CF anycast intercepts port 80, port 3000 bypasses it)
    ports:
      - "3000:3000"
    expose:
      - "3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: 3000
    volumes:
      # Persist SQLite database (including WAL files so data survives rebuilds)
      - ./data.db:/app/data.db
      - ./data.db-shm:/app/data.db-shm
      - ./data.db-wal:/app/data.db-wal
      # Persist logs
      - ./logs:/app/logs
      # content.json — каталог видео (если есть)
      - ./content.json:/app/content.json:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  nginx:
    image: nginx:alpine
    container_name: sca-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      # - /etc/letsencrypt:/etc/letsencrypt:ro  # раскомментировать при добавлении домена+SSL
    networks:
      - internal
    depends_on:
      - app

networks:
  internal:
    driver: bridge
